name: Ephemeral E2E

# Deploys a fully isolated copy of the app (worker incl. its own WebsocketDO
# namespace + fresh D1) under a unique name, runs Playwright against it, and
# always tears everything down.

on:
  workflow_call:
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      WORKERS_DEV_SUBDOMAIN:
        required: true

jobs:
  ephemeral-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      E2E_NAME: stelplaats-e2e-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create ephemeral D1 database
        run: |
          pnpm exec wrangler d1 create "$E2E_NAME"
          DB_ID=$(pnpm exec wrangler d1 info "$E2E_NAME" --json | jq -r '.uuid')
          echo "DB_ID=$DB_ID" >> "$GITHUB_ENV"

      - name: Template wrangler config for this run
        run: |
          sed -i "s/TEMPLATE_E2E_DB_ID/$DB_ID/" wrangler.jsonc
          sed -i "s/\"database_name\": \"stelplaats-e2e\"/\"database_name\": \"$E2E_NAME\"/" wrangler.jsonc

      - name: Apply migrations to the ephemeral D1
        run: pnpm exec wrangler d1 migrations apply DB --remote --env e2e

      - name: Build (e2e environment)
        run: CLOUDFLARE_ENV=e2e pnpm build

      - name: Deploy ephemeral worker
        run: pnpm exec wrangler deploy -c dist/stelplaats/wrangler.json --name "$E2E_NAME"

      - name: Set per-run TEST_AUTH_TOKEN
        run: |
          TOKEN=$(openssl rand -hex 32)
          echo "::add-mask::$TOKEN"
          echo "TEST_AUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          printf '%s' "$TOKEN" | pnpm exec wrangler secret put TEST_AUTH_TOKEN --name "$E2E_NAME"

      - name: Install Playwright browser
        run: pnpm playwright:install

      - name: Run E2E suite against the ephemeral deployment
        env:
          BASE_URL: https://${{ env.E2E_NAME }}.${{ secrets.WORKERS_DEV_SUBDOMAIN }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 3

      - name: Teardown ephemeral resources
        if: always()
        run: |
          pnpm exec wrangler delete --name "$E2E_NAME" --force || echo "worker delete failed (may not exist)"
          pnpm exec wrangler d1 delete "$E2E_NAME" --skip-confirmation || echo "d1 delete failed (may not exist)"
